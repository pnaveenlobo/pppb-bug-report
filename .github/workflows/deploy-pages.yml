name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - index.template.html
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject token and build index.html
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          sed "s|__GH_DISPATCH_TOKEN__|${GH_DISPATCH_TOKEN}|g" index.template.html > index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,*.py,*.txt,*.yml,*.md,*.template.html,report/'
          force_orphan: false
